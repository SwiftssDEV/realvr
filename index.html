<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Swiftss VR Lab V4 — Meta Quest 3S</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #vr-btn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background: #ff3333; color: white; border: 2px solid white;
            border-radius: 8px; font-family: monospace; font-size: 16px; font-weight: bold;
            cursor: pointer; z-index: 9999; box-shadow: 0 0 15px rgba(255,51,51,0.5);
        }
    </style>
</head>
<body>

    <button id="vr-btn" onclick="activateVR()">ENTER VR (META QUEST 3S)</button>
    <canvas id="vrCanvas" style="width:100vw; height:100vh;"></canvas>

    <script>
        const canvas = document.getElementById('vrCanvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        
        if (!gl) { alert("WebGL не поддерживается шлемом!"); }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // Исправленные шейдеры: теперь uMatrix честно принимает готовую финальную VR-матрицу
        const vsSource = `
            attribute vec4 aPosition; attribute vec4 aColor;
            uniform mat4 uMatrix; varying vec4 vColor;
            void main() { gl_Position = uMatrix * aPosition; vColor = aColor; }
        `;
        const fsSource = `
            precision mediumprecision float; varying vec4 vColor;
            void main() { gl_FragColor = vColor; }
        `;

        function initShader(gl, source, type) {
            const s = gl.createShader(type); gl.shaderSource(s, source); gl.compileShader(s); return s;
        }
        const vs = initShader(gl, vsSource, gl.VERTEX_SHADER);
        const fs = initShader(gl, fsSource, gl.FRAGMENT_SHADER);
        const program = gl.createProgram(); gl.attachShader(program, vs); gl.attachShader(program, fs); gl.linkProgram(program); gl.useProgram(program);

        // Геометрия Кентиса и Нюни в 3D координатах
        const vertices = new Float32Array([
            // Световая неоновая разметка пола лаборатории (Зеленая сетка, чтобы ты видел, где стоишь)
            -2, 0, -5,  0, 1, 0, 1,   2, 0, -5,  0, 1, 0, 1,  -2, 0.01, -1,  0, 1, 0, 1,
             2, 0, -5,  0, 1, 0, 1,   2, 0, -1,  0, 1, 0, 1,  -2, 0.01, -1,  0, 1, 0, 1,
            
            // 3D Торс Кентиса V18 (Черная тактическая футболка ровно перед тобой на расстоянии 2 метров)
            -0.2, 0.6, -2,  0.08, 0.08, 0.1, 1,   0.2, 0.6, -2,  0.08, 0.08, 0.1, 1,  -0.2, 1.2, -2,  0.08, 0.08, 0.1, 1,
             0.2, 0.6, -2,  0.08, 0.08, 0.1, 1,   0.2, 1.2, -2,  0.08, 0.08, 0.1, 1,  -0.2, 1.2, -2,  0.08, 0.08, 0.1, 1,
            
            // Белая маска Головы Кентиса (Epic Face основа)
            -0.15, 1.2, -2,  1, 1, 1, 1,   0.15, 1.2, -2,  1, 1, 1, 1,  -0.15, 1.5, -2,  1, 1, 1, 1,
             0.15, 1.2, -2,  1, 1, 1, 1,   0.15, 1.5, -2,  1, 1, 1, 1,  -0.15, 1.5, -2,  1, 1, 1, 1,
            
            // Фирменная прическа Горшок Кентиса (Черный блок оверсайз челки)
            -0.16, 1.45, -2,  0.07, 0.07, 0.09, 1,   0.16, 1.45, -2,  0.07, 0.07, 0.09, 1,  -0.16, 1.58, -2,  0.07, 0.07, 0.09, 1,
             0.16, 1.45, -2,  0.07, 0.07, 0.09, 1,   0.16, 1.58, -2,  0.07, 0.07, 0.09, 1,  -0.16, 1.58, -2,  0.07, 0.07, 0.09, 1,
            
            // Мелкий котенок Нюня на полу (Бело-розовый пушистик в 2 строчки высотой)
             0.35, 0, -1.6,  1, 1, 1, 1,   0.5, 0, -1.6,  1, 1, 1, 1,   0.35, 0.15, -1.6,  1, 1, 1, 1,
             0.5, 0, -1.6,  1, 1, 1, 1,   0.5, 0.15, -1.6,  1, 1, 1, 1,   0.35, 0.15, -1.6,  1, 1, 1, 1,
            // Розовые микро-ушки Нюни
             0.37, 0.15, -1.6,  1, 0.6, 0.6, 1,  0.4, 0.22, -1.6,  1, 0.6, 0.6, 1,  0.4, 0.15, -1.6,  1, 0.6, 0.6, 1
        ]);

        const buffer = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buffer); gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        const FSIZE = vertices.BYTES_PER_ELEMENT;

        const aPosition = gl.getAttribLocation(program, 'aPosition'); gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, FSIZE * 7, 0); gl.enableVertexAttribArray(aPosition);
        const aColor = gl.getAttribLocation(program, 'aColor'); gl.vertexAttribPointer(aColor, 4, gl.FLOAT, false, FSIZE * 7, FSIZE * 3); gl.enableVertexAttribArray(aColor);
        const uMatrix = gl.getUniformLocation(program, 'uMatrix');

        // Вспомогательная хакерская функция для перемножения 3D-матриц шлема (Убирает слепоту линз)
        function multiplyMatrices(out, a, b) {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    out[i * 4 + j] = b[i * 4 + 0] * a[0 * 4 + j] + b[i * 4 + 1] * a[1 * 4 + j] + b[i * 4 + 2] * a[2 * 4 + j] + b[i * 4 + 3] * a[3 * 4 + j];
                }
            }
        }

        let xrSession = null; let xrRefSpace = null;

        function activateVR() {
            if (!navigator.xr) { alert("Открой страницу внутри Meta Quest 3S!"); return; }
            navigator.xr.requestSession('immersive-vr', { requiredFeatures: ['local-floor'] }).then(session => {
                xrSession = session;
                document.getElementById('vr-btn').style.display = 'none';
                gl.makeXRCompatible().then(() => {
                    xrSession.updateRenderState({ baseLayer: new XRWebGLLayer(xrSession, gl) });
                    xrSession.requestReferenceSpace('local-floor').then(refSpace => {
                        xrRefSpace = refSpace;
                        xrSession.requestAnimationFrame(onXRFrame);
                    });
                });
            }).catch(err => { alert("Ошибка VR: " + err.message); });
        }

        const eyeMatrix = new Float32Array(16); // Буфер для финальной матрицы глаза

        function onXRFrame(time, frame) {
            let session = frame.session;
            session.requestAnimationFrame(onXRFrame);
            let pose = frame.getViewerPose(xrRefSpace);

            if (pose) {
                let glLayer = session.renderState.baseLayer;
                gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer.framebuffer);
                
                // Очищаем VR пространство темнотой
                gl.clearColor(0.03, 0.03, 0.05, 1.0); 
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT); 
                gl.enable(gl.DEPTH_TEST);

                for (let view of pose.views) {
                    let viewport = glLayer.getViewport(view);
                    gl.viewport(viewport.x, viewport.y, viewport.width, viewport.height);
                    
                    // ГЕОМЕТРИЧЕСКИЙ ФИКС: Скрещиваем матрицу проекции линзы и инверсию взгляда шлема
                    multiplyMatrices(eyeMatrix, view.projectionMatrix, view.transform.inverse.matrix);
                    
                    // Отправляем готовую матрицу в шейдер — Кентис и Нюня теперь попадут в фокус Квеста!
                    gl.uniformMatrix4fv(uMatrix, false, eyeMatrix);
                    gl.drawArrays(gl.TRIANGLES, 0, vertices.length / 7);
                }
            }
        }
    </script>
</body>
</html>
