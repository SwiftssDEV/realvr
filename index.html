<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Swiftss VR Lab — Meta Quest 3S</title>
    <!-- Ультра-стабильное VR-ядро A-Frame под Quest 3S -->
    <script src="https://aframe.io"></script>
</head>
<body style="margin: 0; overflow: hidden; background-color: #000;">

    <a-scene xr-mode-ui="enabled: true">
        
        <!-- Хакерское темное пространство лаборатории -->
        <a-sky color="#040406"></a-sky>

        <!-- Жесткий пол камеры тестов -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#0f0f13"></a-plane>
        
        <!-- Световая разметка на полу для VR масштаба -->
        
        

        <!-- Тестовый Неоновый Куб (Кликни по нему лазером контроллера!) -->
        <a-box id="test-cube" 
               position="0 1.4 -2.5" 
               rotation="0 45 0" 
               width="0.6" height="0.6" depth="0.6" 
               color="#ff3333"
               animation="property: rotation; to: 0 405 0; loop: true; dur: 6000; easing: linear">
        </a-box>

        <!-- 3D МОДЕЛЬ KENTIS_DUMMY В ПОЛНЫЙ VR РОСТ -->
        
            <!-- Голова и кастомный Горшок Кентиса -->
            <a-sphere position="0 1.4 0" radius="0.15" color="#FFFFFF"></a-sphere>
            <a-sphere position="0 1.46 0" radius="0.16" color="#141416" theta-length="90"></a-sphere>
            
            <!-- Футболка и перчатки -->
            <a-cylinder position="0 0.95 0" radius="0.13" height="0.5" color="#16161a"></a-cylinder>
            <a-cylinder position="-0.18 1.05 0" radius="0.035" height="0.35" color="#FFFFFF" rotation="0 0 20"></a-cylinder>
            <a-sphere position="-0.23 0.88 0" radius="0.045" color="#111111"></a-sphere> 

            <a-cylinder position="0.18 1.05 0" radius="0.035" height="0.35" color="#FFFFFF" rotation="0 0 -20"></a-cylinder>
            <a-sphere position="0.23 0.88 0" radius="0.045" color="#111111"></a-sphere>

            <!-- Штаны и ботинки -->
            <a-box position="0 0.65 0" width="0.24" height="0.12" depth="0.12" color="#0b0b0d"></a-box>
            <a-cylinder position="-0.07 0.35 0" radius="0.04" height="0.45" color="#FFFFFF"></a-cylinder>
            <a-sphere position="-0.07 0.08 0.02" radius="0.05" color="#111111"></a-sphere>
            <a-cylinder position="0.07 0.35 0" radius="0.04" height="0.45" color="#FFFFFF"></a-cylinder>
            <a-sphere position="0.07 0.08 0.02" radius="0.05" color="#111111"></a-sphere>
        

        <!-- 3D МОДЕЛЬ КОТЕНКА НЮНИ (Размер ровно в 2 строчки, ~25см) -->
        
            <a-sphere position="0 0.1 0" radius="0.1" scale="1 0.7 0.7" color="#FFFFFF"></a-sphere>
            <a-sphere position="-0.1 0.15 0" radius="0.07" color="#FFFFFF"></a-sphere>
            <!-- Розовые Ушки -->
            <a-cone position="-0.13 0.21 0.02" radius-bottom="0.015" height="0.04" color="#ffb3c1" rotation="0 0 15"></a-cone>
            <a-cone position="-0.1 0.21 -0.02" radius-bottom="0.015" height="0.04" color="#ffb3c1" rotation="0 0 -15"></a-cone>
            <!-- Лапки и хвост -->
            <a-cylinder position="-0.05 0.03 0.03" radius="0.012" height="0.06" color="#FFFFFF"></a-cylinder>
            <a-cylinder position="-0.05 0.03 -0.03" radius="0.012" height="0.06" color="#FFFFFF"></a-cylinder>
            <a-cylinder position="0.05 0.03 0.03" radius="0.012" height="0.06" color="#FFFFFF"></a-cylinder>
            <a-cylinder position="0.05 0.03 -0.03" radius="0.012" height="0.06" color="#FFFFFF"></a-cylinder>
            <a-cylinder position="0.09 0.13 0" radius="0.008" height="0.1" color="#000000" rotation="45 0 0"></a-cylinder>
        

        <!-- ПАРЯЩИЙ НЕОНОВЫЙ VR-МОНИТОР FRUKT -->
        
            <a-plane width="1.4" height="0.7" color="#0a0404" opacity="0.9"></a-plane>
            <a-box width="1.42" height="0.72" depth="0.005" color="#ff3333" wireframe="true"></a-box>
            
            <a-text value="KENTISS_VR_MONITOR_v2.0" position="-0.65 0.25 0.01" color="#ff3333" width="2.8"></a-text>
            <a-text id="txt-brain" value="> AI_BRAIN: 100% (ACTIVE)" position="-0.65 0.05 0.01" color="#00ff66" width="2.2"></a-text>
            <a-text id="txt-heart" value="> HEART_HP: 100% (75 BPM)" position="-0.65 -0.1 0.01" color="#00ff66" width="2.2"></a-text>
            <a-text id="txt-blood" value="> DUMMY_STATUS: STABLE" position="-0.65 -0.25 0.01" color="#ff9900" width="1.8"></a-text>
        

        <!-- НАСТРОЙКА ТРЕКИНГА КАМЕРЫ И ЛАЗЕРНЫХ КОНТРОЛЛЕРОВ QUEST 3S -->
        
            
            <!-- Левый лазерный указатель -->
            
            <!-- Правый лазерный указатель -->
            
        

    </a-scene>

    <script>
        // Интерактивный клик лазером контроллера по кубу (Проверка работы WebXR)
        const cube = document.querySelector('#test-cube');
        cube.addEventListener('click', function () {
            // При клике триггером контроллера — куб взрывается хоррор-красным цветом!
            cube.setAttribute('color', '#2b0000');
            
            // На мониторе вылетает лог критического сбоя FRUKT-лаборатории
            document.querySelector('#txt-brain').setAttribute('value', '> AI_BRAIN: 0% (CRITICAL_ERROR)');
            document.querySelector('#txt-brain').setAttribute('color', '#ff0000');
            document.querySelector('#txt-heart').setAttribute('value', '> HEART_HP: 0% (0 BPM)');
            document.querySelector('#txt-heart').setAttribute('color', '#ff0000');
            document.querySelector('#txt-blood').setAttribute('value', '> DUMMY_STATUS: CLINICAL_DEATH');
            document.querySelector('#txt-blood').setAttribute('color', '#ff0000');

            // Перекрашиваем Кентиса в хоррор-скин воксельной смерти
            document.querySelectorAll('#vr-kentis *').forEach(part => {
                if(part.tagName.toLowerCase() !== 'a-entity') part.setAttribute('color', '#2b0000');
            });
        });
    </script>
</body>
</html>
